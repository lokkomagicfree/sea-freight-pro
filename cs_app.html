<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Tracking — Sea Freight Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFF5F5;--s1:#FFFFFF;--s2:#FFF0F0;--s3:#FFE8E8;
  --border:#F0CCCC;--border2:#E8BBBB;
  --cyan:#2980B9;--green:#27AE60;--red:#C0392B;--red2:#E74C3C;
  --gold:#B7800A;--orange:#D35400;
  --text:#2C1A1A;--muted:#9E6B6B;--dim:#C9A0A0;
  --mono:'DM Mono',monospace;--sans:'DM Sans','Sarabun',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.topbar{position:sticky;top:0;z-index:200;background:var(--red);border-bottom:1px solid #A93226;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.logo{font-family:var(--mono);font-size:14px;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px}
.agent-badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.5);color:#fff;font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 12px;border-radius:99px}
.page{padding:18px 20px;max-width:1400px;margin:0 auto}
.card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(192,57,43,.06)}
.card-title{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.tbl-wrap{overflow-x:auto;background:var(--s1);border:1px solid var(--border);border-radius:10px;box-shadow:0 1px 4px rgba(192,57,43,.06)}
table{width:100%;border-collapse:collapse}
th{background:var(--s2);color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border2);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
tr:hover td{background:var(--s2)}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:10px;font-weight:700;font-family:var(--mono)}
.badge-pending{background:rgba(243,156,18,.12);color:#B7800A;border:1px solid rgba(183,128,10,.3)}
.badge-confirmed{background:rgba(39,174,96,.12);color:var(--green);border:1px solid rgba(39,174,96,.3)}
.badge-loaded{background:rgba(41,128,185,.12);color:var(--cyan);border:1px solid rgba(41,128,185,.3)}
.badge-completed{background:rgba(100,100,100,.1);color:#888;border:1px solid rgba(100,100,100,.2)}
.badge-cancelled{background:rgba(192,57,43,.1);color:var(--red);border:1px solid rgba(192,57,43,.25)}
.inp{background:var(--s2);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--text);font-family:var(--mono);font-size:12px;width:100%;outline:none}
.inp:focus{border-color:var(--red)}
select.inp{cursor:pointer}
.btn{border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;padding:6px 14px;font-family:var(--sans);transition:all .15s}
.btn-cyan{background:var(--red);color:#fff}
.btn-cyan:hover{background:var(--red2)}
.btn-ghost{background:var(--s2);border:1.5px solid var(--border2);color:var(--text);font-weight:600}
.btn-ghost:hover{background:var(--s3)}
.btn-green{background:var(--green);color:#fff}
.task-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px}
.task-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--red);flex-shrink:0}
.remark-box{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:11px;color:var(--muted);min-height:32px;cursor:pointer}
.remark-box:hover{border-color:var(--red)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:12px;width:min(560px,96vw);max-height:88vh;overflow-y:auto;padding:22px;box-shadow:0 8px 32px rgba(192,57,43,.15)}
.modal-title{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--red);margin-bottom:16px}
.label{font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.06em}
.toast{position:fixed;bottom:24px;right:24px;background:var(--red);color:#fff;font-family:var(--mono);font-size:12px;padding:10px 18px;border-radius:8px;z-index:9999;box-shadow:0 4px 20px rgba(192,57,43,.3)}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:12px 14px;box-shadow:0 1px 3px rgba(192,57,43,.06)}
.stat-val{font-family:var(--mono);font-size:22px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.fi{background:var(--s2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:11px;padding:5px 9px;outline:none;font-family:var(--mono)}
.fi:focus{border-color:var(--red)}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tasks-progress{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
.tasks-progress-bar{height:100%;background:var(--red);border-radius:2px;transition:width .3s}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div style="font-family:var(--mono);font-size:12px;color:var(--muted)">Connecting to Sea Freight Pro…</div>
</div>

<!-- Topbar -->
<div class="topbar">
  <div class="logo">
    <span style="color:var(--red)">Sea Freight</span><span>Pro</span>
    <span style="color:var(--muted);font-size:11px;font-weight:400">· CS Portal</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="agent-badge" id="agent_badge">Loading…</span>
    <span id="live_badge" style="font-size:10px;font-family:'DM Mono',monospace;color:var(--green);opacity:.4;transition:opacity .3s">● LIVE</span>
    <button class="btn btn-ghost" style="font-size:10px;padding:4px 10px" onclick="refreshData()">🔄 Refresh</button>
  </div>
</div>

<!-- Page -->
<div class="page">

  <!-- Stats -->
  <div id="debug_banner" style="margin-bottom:12px;padding:8px 14px;background:rgba(0,180,216,.08);border:1px solid rgba(0,180,216,.2);border-radius:8px;font-family:var(--mono);font-size:11px;color:var(--muted)">
    🔍 กำลังดึง Shipments ที่ assign ให้ <span id="debug_agent" style="color:var(--cyan);font-weight:700"></span>
    <span id="debug_count" style="margin-left:8px"></span>
  </div>

  <div class="stat-grid" id="stat_grid"></div>

  <!-- Cutoff Alerts -->
  <div id="cutoff_alerts" style="margin-bottom:14px;display:none">
    <div class="card" style="padding:12px 16px;border-color:rgba(220,80,80,.3)">
      <div style="font-family:var(--mono);font-size:10px;color:var(--accent2);letter-spacing:.08em;margin-bottom:8px">⏰ UPCOMING CUTOFFS</div>
      <div id="cutoff_list" style="display:flex;flex-wrap:wrap;gap:8px"></div>
    </div>
  </div>

  <!-- In-Transit Alerts -->
  <div id="cb_alerts_wrap" style="margin-bottom:14px;display:none">
    <div class="card" style="padding:12px 16px;border-color:rgba(243,156,18,.3)">
      <div style="font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.08em;margin-bottom:8px">🚛 IN-TRANSIT / CROSS BORDER — INVOICE ALERTS</div>
      <div id="cb_alerts_list"></div>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <input class="fi" id="search_inp" placeholder="🔍 Booking / Customer…" oninput="renderTable()" style="width:200px">
    <select class="fi" id="status_fil" onchange="renderTable()">
      <option value="">All Status</option>
      <option value="pending">Pending</option>
      <option value="confirmed">Confirmed</option>
      <option value="loaded">Loaded</option>
      <option value="completed">Completed</option>
      <option value="cancelled">Cancelled</option>
    </select>
    <select class="fi" id="month_fil" onchange="renderTable()">
      <option value="">All Months</option>
    </select>
    <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);cursor:pointer;font-family:var(--mono)">
      <input type="checkbox" id="tasks_only" onchange="renderTable()" style="accent-color:var(--cyan)">
      มีงานค้าง
    </label>
  </div>

  <!-- Table -->
  <div class="card" style="padding:0;overflow:hidden">
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>BOOKING NO.</th>
            <th>CUSTOMER</th>
            <th>POL → POD</th>
            <th>ETD</th>
            <th>ETA</th>
            <th>VESSEL / VOY</th>
            <th>STATUS</th>
            <th style="min-width:180px">CS TASKS</th>
            <th style="min-width:200px">REMARKS</th>
            <th style="text-align:center">ACTION</th>
          </tr>
        </thead>
        <tbody id="cs_tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Edit Modal -->
<div class="modal-bg" id="edit_modal" style="display:none" onclick="if(event.target===this){}">
  <div class="modal">
    <div class="modal-title" id="modal_bkgno">📋 BKG-001</div>

    <div style="margin-bottom:14px">
      <span class="label">STATUS</span>
      <select class="inp" id="m_status">
        <option value="pending">⏳ Pending</option>
        <option value="confirmed">✅ Confirmed</option>
        <option value="loaded">🚢 Loaded</option>
        <option value="completed">✔ Completed</option>
        <option value="cancelled">✘ Cancelled</option>
      </select>
    </div>

    <div style="margin-bottom:14px">
      <span class="label">REMARKS</span>
      <textarea class="inp" id="m_remarks" rows="3" style="resize:vertical;font-family:var(--sans)"></textarea>
    </div>

    <div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span class="label" style="margin:0">CS TASKS</span>
        <button class="btn btn-ghost" style="font-size:10px;padding:3px 8px" onclick="addTask()">+ Add Task</button>
      </div>
      <div id="m_tasks_list"></div>
    </div>

    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-cyan" onclick="saveChanges()">💾 Save</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
import { getAuth, signInAnonymously }
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7uD5a2HnYuBeX0pkL17-H8hf2ZTybb6s",
  authDomain: "sea-freight-pro.firebaseapp.com",
  projectId: "sea-freight-pro",
  storageBucket: "sea-freight-pro.firebasestorage.app",
  messagingSenderId: "513112241807",
  appId: "1:513112241807:web:3c4c43616f94c9577022fa"
};

const app  = initializeApp(firebaseConfig, 'cs-portal');
const db   = getFirestore(app);
const auth = getAuth(app);

// ── URL params ─────────────────────────────────────────────
const params  = new URLSearchParams(location.search);
const AGENT   = (params.get('agent')||'').trim();
const OWNER   = (params.get('owner')||'').trim(); // owner UID

document.getElementById('agent_badge').textContent = AGENT ? '👤 '+AGENT : '⚠ No agent set';

if(!AGENT){
  document.getElementById('loading').innerHTML = `
    <div style="text-align:center;color:var(--text);font-family:'DM Mono',monospace">
      <div style="font-size:16px;margin-bottom:8px;color:var(--red)">⚠ ไม่ระบุ agent</div>
      <div style="font-size:12px;color:var(--muted)">กรุณาเปิดลิ้งค์ที่ได้รับจาก Sea Freight Pro<br>เช่น cs_app.html?agent=ชื่อCS&owner=UID</div>
    </div>`;
  throw new Error('No agent');
}

// ── State ──────────────────────────────────────────────────
let allJobs = [];
let editIdx = null;
let ownerUid = OWNER;
let taskList = [];

// ── Firebase helpers ───────────────────────────────────────
async function fbGet(path){
  try{
    const snap = await getDoc(doc(db,'users',ownerUid,...path.split('/')));
    return snap.exists() ? snap.data() : null;
  }catch(e){ return null; }
}
async function fbSet(path, data){
  await setDoc(doc(db,'users',ownerUid,...path.split('/')), data, {merge:true});
}

// ── Real-time listener ─────────────────────────────────────
let _unsubscribe = null;

function startLiveSync(){
  if(!ownerUid){
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;color:var(--text);font-family:'DM Mono',monospace;padding:20px">
        <div style="font-size:15px;margin-bottom:10px;color:#00b4d8">🔗 CS Portal — Sea Freight Pro</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.8">
          ลิ้งค์นี้ไม่มี <b style="color:#e8eaf0">owner</b> parameter<br>
          กรุณาคัดลอก CS Link จากหน้า Shipments ใน Sea Freight Pro<br><br>
          <span style="color:var(--gold)">รูปแบบ: cs_app.html?agent=ชื่อ&owner=UID</span>
        </div>
      </div>`;
    return;
  }

  document.getElementById('loading').style.display = 'flex';

  // onSnapshot — fires immediately + every time data changes in Firestore
  const docRef = doc(db, 'users', ownerUid, 'data', 'jobs');
  _unsubscribe = onSnapshot(docRef, (snap) => {
    const data = snap.exists() ? snap.data() : null;
    console.log('📦 Firestore data:', snap.exists(), 'jobs:', data?.jobs?.length||0);
    if(data?.jobs){
      allJobs = data.jobs.filter(j=>
        (j.csAssigned||'').toLowerCase().trim() === AGENT.toLowerCase().trim()
      );
      console.log('👤 Filtered for agent "'+AGENT+'":', allJobs.length, 'jobs');
      // Debug: show all unique csAssigned values
      const assigned = [...new Set(data.jobs.map(j=>j.csAssigned||'(none)'))];
      console.log('🔍 All csAssigned values:', assigned);
      // Update debug banner
      const dbAgent = document.getElementById('debug_agent');
      const dbCount = document.getElementById('debug_count');
      if(dbAgent) dbAgent.textContent = AGENT;
      if(dbCount) dbCount.textContent = allJobs.length
        ? `— พบ ${allJobs.length} shipment ✅`
        : `— ไม่พบ shipment (ค่าในระบบ: ${assigned.filter(a=>a!=='(none)').join(', ')||'ยังไม่มีค่า csAssigned'})`;
    } else {
      allJobs = [];
      const dbAgent = document.getElementById('debug_agent');
      const dbCount = document.getElementById('debug_count');
      if(dbAgent) dbAgent.textContent = AGENT;
      if(dbCount) dbCount.textContent = '— ไม่พบข้อมูลใน Firestore';
    }
    document.getElementById('loading').style.display = 'none';
    buildMonthFilter();
    renderStats();
    renderCutoffAlerts();
    renderTable();
    // Show live badge
    const badge = document.getElementById('live_badge');
    if(badge){ badge.style.opacity='1'; setTimeout(()=>badge.style.opacity='.4', 800); }
  }, (err) => {
    console.error('Firestore error:', err);
    document.getElementById('loading').style.display = 'none';
    toast('❌ Connection error: '+err.message);
  });

  // Listen to In-Transit data for invoice alerts
  const cbRef = doc(db, 'users', ownerUid, 'data', 'dbIntransit');
  onSnapshot(cbRef, (snap) => {
    const data = snap.exists() ? snap.data() : null;
    renderCBAlerts(data?.rows || []);
  }, ()=>{});
}

async function loadData(){ startLiveSync(); }
window.refreshData = function(){ toast('🔄 Live sync active — ข้อมูลอัพเดต real-time'); };

// ── Cutoff Alerts ──────────────────────────────────────────
function renderCutoffAlerts(){
  const wrap = document.getElementById('cutoff_alerts');
  const list = document.getElementById('cutoff_list');
  if(!wrap||!list) return;
  const alerts = [];
  const now = new Date();
  allJobs.forEach(j=>{
    const fields = [
      {label:'SI Cut-Off', val:j.siCutoff, bkgno:j.no},
      {label:'VGM Cut-Off', val:j.vgmCutoff, bkgno:j.no},
      {label:'Doc Cut-Off', val:j.docCutoff, bkgno:j.no},
      {label:'Gate Closing', val:j.gateClosing, bkgno:j.no},
    ];
    fields.forEach(f=>{
      if(!f.val) return;
      // Try to parse date from string like "02/JUN/2026 17:00 HRS."
      const dm = f.val.match(/(\d{1,2})[\/\-]([A-Za-z]+|\d{1,2})[\/\-](\d{4})/);
      if(!dm) return;
      const months={'JAN':0,'FEB':1,'MAR':2,'APR':3,'MAY':4,'JUN':5,'JUL':6,'AUG':7,'SEP':8,'OCT':9,'NOV':10,'DEC':11};
      const mo = isNaN(dm[2]) ? (months[dm[2].toUpperCase()]??-1) : parseInt(dm[2])-1;
      if(mo<0) return;
      const d = new Date(parseInt(dm[3]), mo, parseInt(dm[1]));
      const diff = Math.ceil((d-now)/86400000);
      if(diff >= 0 && diff <= 5) alerts.push({...f, diff, dateStr:f.val});
    });
  });
  if(!alerts.length){ wrap.style.display='none'; return; }
  wrap.style.display='';
  list.innerHTML = alerts.sort((a,b)=>a.diff-b.diff).map(a=>{
    const col = a.diff===0?'rgba(220,80,80,.8)':a.diff<=2?'rgba(230,120,0,.8)':'rgba(243,156,18,.7)';
    return `<div style="background:rgba(0,0,0,.3);border:1px solid ${col};border-radius:8px;padding:6px 12px;font-size:11px;font-family:var(--mono)">
      <div style="color:${col};font-weight:700">${a.diff===0?'⚡ TODAY':a.diff===1?'⚠ TOMORROW':'📅 '+a.diff+' days'}</div>
      <div style="color:var(--text);margin-top:2px">${a.bkgno} — ${a.label}</div>
      <div style="color:var(--muted);font-size:10px">${a.dateStr}</div>
    </div>`;
  }).join('');
}

// ── In-Transit Invoice Alerts ──────────────────────────────
function renderCBAlerts(rows){
  const wrap = document.getElementById('cb_alerts_wrap');
  const list = document.getElementById('cb_alerts_list');
  if(!wrap||!list) return;
  // Filter rows assigned to this CS agent
  const mine = rows.filter(r=>(r.csAssigned||'').toLowerCase().trim()===AGENT.toLowerCase().trim());
  if(!mine.length){ wrap.style.display='none'; return; }
  // Show invoice status
  const pending = mine.filter(r=>!r.invoice||r.invoice!=='YES'||!r.sentToDb||r.sentToDb!=='YES');
  if(!pending.length){ wrap.style.display='none'; return; }
  wrap.style.display='';
  list.innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:11px">
    <tr style="border-bottom:1px solid rgba(243,156,18,.2)">
      <th style="padding:6px 8px;text-align:left;font-family:var(--mono);font-size:10px;color:var(--muted)">BOOKING</th>
      <th style="padding:6px 8px;text-align:left;font-family:var(--mono);font-size:10px;color:var(--muted)">SHIPPER</th>
      <th style="padding:6px 8px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--muted)">INV TO CUSTOMER</th>
      <th style="padding:6px 8px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--muted)">INV FROM VENDOR</th>
      <th style="padding:6px 8px;text-align:left;font-family:var(--mono);font-size:10px;color:var(--muted)">INV NO.</th>
    </tr>
    ${pending.map(r=>{
      const invDone = r.invoice==='YES';
      const sentDone = r.sentToDb==='YES';
      return `<tr style="border-bottom:1px solid rgba(255,255,255,.05)">
        <td style="padding:6px 8px;font-family:var(--mono);color:var(--accent2)">${r.customerBooking||r.bookingNo||'—'}</td>
        <td style="padding:6px 8px;color:var(--text)">${r.shipper||'—'}</td>
        <td style="padding:6px 8px;text-align:center">
          <span style="padding:2px 10px;border-radius:99px;font-size:10px;font-weight:700;font-family:var(--mono);${invDone?'background:rgba(39,174,96,.15);color:#27ae60;border:1px solid rgba(39,174,96,.3)':'background:rgba(220,80,80,.15);color:var(--accent2);border:1px solid rgba(220,80,80,.3)'}">
            ${invDone?'✅ Done':'⏳ Pending'}
          </span>
        </td>
        <td style="padding:6px 8px;text-align:center">
          <span style="padding:2px 10px;border-radius:99px;font-size:10px;font-weight:700;font-family:var(--mono);${sentDone?'background:rgba(39,174,96,.15);color:#27ae60;border:1px solid rgba(39,174,96,.3)':'background:rgba(243,156,18,.15);color:var(--gold);border:1px solid rgba(243,156,18,.3)'}">
            ${sentDone?'✅ Received':'⏳ Waiting'}
          </span>
        </td>
        <td style="padding:6px 8px;font-family:var(--mono);font-size:10px;color:var(--muted)">${r.invNo||'—'}</td>
      </tr>`;
    }).join('')}
  </table>`;
}

// ── Build month filter ─────────────────────────────────────
function buildMonthFilter(){
  const MN={'01':'Jan','02':'Feb','03':'Mar','04':'Apr','05':'May','06':'Jun','07':'Jul','08':'Aug','09':'Sep','10':'Oct','11':'Nov','12':'Dec'};
  const months = [...new Set(allJobs.map(j=>j.etdMonth||j.etaMonth||'').filter(Boolean))].sort().reverse();
  const sel = document.getElementById('month_fil');
  sel.innerHTML = '<option value="">All Months</option>' +
    months.map(m=>{ const[y,mo]=m.split('-'); return `<option value="${m}">${MN[mo]||mo} ${y}</option>`; }).join('');
}

// ── Stats ──────────────────────────────────────────────────
function renderStats(){
  const total = allJobs.length;
  const pending   = allJobs.filter(j=>j.status==='pending').length;
  const confirmed = allJobs.filter(j=>j.status==='confirmed').length;
  const loaded    = allJobs.filter(j=>j.status==='loaded').length;
  const withTasks = allJobs.filter(j=>(j.csTasks||'').trim()).length;
  const tasksDone = allJobs.filter(j=>{
    const t = parseTasks(j.csTasks||'');
    return t.length > 0 && t.every(x=>x.done);
  }).length;

  const stats = [
    {val:total,     lbl:'Total Jobs',    col:'var(--cyan)'},
    {val:pending,   lbl:'Pending',       col:'var(--gold)'},
    {val:confirmed, lbl:'Confirmed',     col:'var(--green)'},
    {val:loaded,    lbl:'Loaded',        col:'var(--cyan)'},
    {val:withTasks-tasksDone, lbl:'Tasks Pending', col:'var(--orange)'},
  ];
  document.getElementById('stat_grid').innerHTML = stats.map(s=>
    `<div class="stat"><div class="stat-val" style="color:${s.col}">${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`
  ).join('');
}

// ── Parse tasks string ─────────────────────────────────────
// Format: "✅ Task1|⬜ Task2|✅ Task3"
function parseTasks(str){
  if(!str||!str.trim()) return [];
  return str.split('|').map(t=>{
    const done = t.startsWith('✅');
    const text = t.replace(/^[✅⬜]\s*/,'').trim();
    return {text, done};
  }).filter(t=>t.text);
}
function serializeTasks(arr){
  return arr.map(t=>(t.done?'✅ ':'⬜ ')+t.text).join('|');
}

// ── Render table ───────────────────────────────────────────
function renderTable(){
  const search = (document.getElementById('search_inp').value||'').toLowerCase();
  const stFil  = document.getElementById('status_fil').value;
  const mFil   = document.getElementById('month_fil').value;
  const tasksOnly = document.getElementById('tasks_only').checked;

  const jobs = allJobs.filter((j,i)=>{
    j._idx = i;
    if(search && !(j.no||'').toLowerCase().includes(search) && !(j.customer||j.shipper||'').toLowerCase().includes(search)) return false;
    if(stFil && j.status !== stFil) return false;
    if(mFil && (j.etdMonth||j.etaMonth||'') !== mFil) return false;
    if(tasksOnly){
      const tasks = parseTasks(j.csTasks||'');
      if(!tasks.length || tasks.every(t=>t.done)) return false;
    }
    return true;
  });

  const statusBadge = s=>{
    const map={pending:'badge-pending',confirmed:'badge-confirmed',loaded:'badge-loaded',completed:'badge-completed',cancelled:'badge-cancelled'};
    const labels={pending:'⏳ Pending',confirmed:'✅ Confirmed',loaded:'🚢 Loaded',completed:'✔ Done',cancelled:'✘ Cancelled'};
    return `<span class="badge ${map[s]||'badge-pending'}">${labels[s]||s}</span>`;
  };

  const tbody = document.getElementById('cs_tbody');
  if(!jobs.length){
    tbody.innerHTML = `<tr><td colspan="10"><div class="empty">ไม่มี Shipment ที่ assign ให้ <b>${AGENT}</b></div></td></tr>`;
    return;
  }

  tbody.innerHTML = jobs.map(j=>{
    const tasks = parseTasks(j.csTasks||'');
    const doneCount = tasks.filter(t=>t.done).length;
    const progress = tasks.length ? Math.round(doneCount/tasks.length*100) : 0;
    const tasksHtml = tasks.length
      ? `<div style="font-size:10px;color:var(--muted);font-family:var(--mono)">${doneCount}/${tasks.length} done</div>
         <div class="tasks-progress"><div class="tasks-progress-bar" style="width:${progress}%"></div></div>
         <div style="margin-top:4px">
           ${tasks.slice(0,2).map(t=>`<div style="font-size:10px;color:${t.done?'var(--muted)':'var(--text)'};${t.done?'text-decoration:line-through':''};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px">${t.done?'✅':'⬜'} ${t.text}</div>`).join('')}
           ${tasks.length>2?`<div style="font-size:10px;color:var(--muted)">+${tasks.length-2} more…</div>`:''}
         </div>`
      : '<span style="color:var(--muted);font-size:10px">—</span>';

    const vessel = [j.vessel, j.voyage].filter(Boolean).join(' / ') || '—';
    const pol = j.pol||'—', pod = j.pod||'—';
    const etd = j.etd ? new Date(j.etd+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) : '—';
    const eta = j.eta ? new Date(j.eta+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) : '—';
    const remark = (j.remarks||'').trim();

    return `<tr>
      <td><span style="font-family:var(--mono);font-size:11px;font-weight:700;color:var(--cyan)">${j.no||'—'}</span></td>
      <td style="font-size:12px">${j.customer||j.shipper||'—'}</td>
      <td style="font-family:var(--mono);font-size:10px;white-space:nowrap">${pol} → ${pod}</td>
      <td style="font-family:var(--mono);font-size:11px">${etd}</td>
      <td style="font-family:var(--mono);font-size:11px">${eta}</td>
      <td style="font-family:var(--mono);font-size:10px;color:var(--muted)">${vessel}</td>
      <td>${statusBadge(j.status||'pending')}</td>
      <td>${tasksHtml}</td>
      <td>
        <div class="remark-box" onclick="openModal(${j._idx})" title="คลิกเพื่อแก้ไข">${remark||'<span style="color:var(--muted)">—</span>'}</div>
      </td>
      <td style="text-align:center">
        <button class="btn btn-cyan" style="font-size:10px;padding:4px 10px" onclick="openModal(${j._idx})">✏ Edit</button>
      </td>
    </tr>`;
  }).join('');
}

// ── Modal ──────────────────────────────────────────────────
window.openModal = function(idx){
  editIdx = idx;
  const j = allJobs[idx];
  document.getElementById('modal_bkgno').textContent = '📋 '+( j.no||'—')+' · '+(j.customer||j.shipper||'');
  document.getElementById('m_status').value  = j.status||'pending';
  document.getElementById('m_remarks').value = j.remarks||'';
  taskList = parseTasks(j.csTasks||'');
  renderTaskList();
  document.getElementById('edit_modal').style.display = 'flex';
};

window.closeModal = function(){
  document.getElementById('edit_modal').style.display = 'none';
  editIdx = null;
};

function renderTaskList(){
  document.getElementById('m_tasks_list').innerHTML = taskList.length
    ? taskList.map((t,i)=>`
        <div class="task-item">
          <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${i},this.checked)">
          <input class="inp" value="${t.text.replace(/"/g,'&quot;')}" oninput="taskList[${i}].text=this.value"
            style="flex:1;padding:4px 8px;font-size:12px" placeholder="ชื่องาน…">
          <button onclick="removeTask(${i})" style="border:none;background:rgba(192,57,43,.1);color:var(--red);cursor:pointer;width:22px;height:22px;border-radius:5px;font-size:12px">✕</button>
        </div>`).join('')
    : '<div style="font-size:11px;color:var(--muted);padding:6px 0">ยังไม่มี task — กด + Add Task</div>';
}

window.addTask = function(){
  taskList.push({text:'',done:false});
  renderTaskList();
  const inputs = document.querySelectorAll('#m_tasks_list .inp');
  if(inputs.length) inputs[inputs.length-1].focus();
};

window.toggleTask = function(i, val){ taskList[i].done = val; };
window.removeTask = function(i){ taskList.splice(i,1); renderTaskList(); };

window.saveChanges = async function(){
  if(editIdx === null) return;
  const j = allJobs[editIdx];
  j.status  = document.getElementById('m_status').value;
  j.remarks = document.getElementById('m_remarks').value;
  j.csTasks = serializeTasks(taskList);

  // Write back to Firestore
  // Need to find job in full savedJobs array and update
  try{
    const snap = await fbGet('data/jobs');
    if(snap?.jobs){
      const fullJobs = snap.jobs;
      const target = fullJobs.find(x=>x.no===j.no);
      if(target){
        target.status  = j.status;
        target.remarks = j.remarks;
        target.csTasks = j.csTasks;
        if(!target.statusHistory) target.statusHistory = [];
        target.statusHistory.push({status:j.status, date:new Date().toISOString(), note:'Updated by CS: '+AGENT});
        await fbSet('data/jobs', {jobs: fullJobs});
        toast('✅ Saved!');
      }
    }
  }catch(e){
    toast('❌ Error: '+e.message);
    console.error(e);
  }
  closeModal();
  renderStats();
  renderTable();
};

function toast(msg){
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 2500);
}

// ── Init: sign in anonymously then start live sync ─────────
signInAnonymously(auth)
  .then(() => loadData())
  .catch(err => {
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;color:var(--text);font-family:'DM Mono',monospace">
        <div style="font-size:14px;color:var(--red);margin-bottom:8px">❌ Auth Error</div>
        <div style="font-size:11px;color:var(--muted)">${err.message}</div>
      </div>`;
  });
</script>
