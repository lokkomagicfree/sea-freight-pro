  function freeDesk(c){if(c.desk){c.desk.occupant=null;c.desk=null;}}
  function goWork(i){var c=chars[i];if(!c)return;selected=c;freeDesk(c);var d;if(c.boss)d=bossDesk;else{var open=desks.filter(function(x){return!x.occupant;});d=open.length?pick(open):pick(desks);d.occupant=c;}c.desk=d;c.goal='work';c.tx=d.seat.x;c.ty=d.seat.y;c.state='walk';c.big=true;setPose(c,'stand');}

  function chooseGoal(c){freeDesk(c);var r=Math.random();if(c.boss){if(r<0.3){c.desk=bossDesk;c.goal='work';c.tx=bossDesk.seat.x;c.ty=bossDesk.seat.y;}else if(r<0.55){var d=pick(desks);c.goal='wander';c.tx=d.x+44;c.ty=d.y+34;}else if(r<0.7){c.goal='coffee';c.tx=coffeeSpot.x+8;c.ty=coffeeSpot.y;}else if(r<0.85){var p=pick(loungeSpots);c.goal='lounge';c.tx=p.x;c.ty=p.y;}else{c.goal='drink';c.tx=460;c.ty=262;}c.state='walk';return;}var busy=c._busy||0;var wt=0.42+Math.min(busy,5)*0.06;if(r<wt){var open=desks.filter(function(d){return!d.occupant;});if(open.length){var d=pick(open);d.occupant=c;c.desk=d;c.goal='work';c.tx=d.seat.x;c.ty=d.seat.y;c.state='walk';return;}}if(r<0.6){c.goal='coffee';c.tx=coffeeSpot.x-8+Math.random()*20;c.ty=coffeeSpot.y;c.state='walk';return;}if(r<0.75){var p=pick(loungeSpots);c.goal='lounge';c.tx=p.x;c.ty=p.y;c.state='walk';return;}if(r<0.86){c.goal='drink';c.tx=459+Math.random()*8;c.ty=262;c.state='walk';return;}c.goal='wander';c.tx=70+Math.random()*430;c.ty=286+Math.random()*150;c.state='walk';}

  var AR={work:['work','work'],drink:['drink','drink'],coffee:['drink','drink'],lounge:['idle','stand'],wander:['idle','stand']};
  function frame(){
   if(!scene.isConnected)return; /* stop loop when office removed */
   chars.forEach(function(c){if(c.state==='walk'){var dx=c.tx-c.x,dy=c.ty-c.y,d=Math.hypot(dx,dy);if(d<3){var a=AR[c.goal];c.state=a[0];setPose(c,a[1]);c.timer=c.big?720:(c.goal==='work'?260+Math.random()*280:(c.goal==='drink'||c.goal==='coffee')?120+Math.random()*70:c.goal==='lounge'?200+Math.random()*150:70+Math.random()*110);c.big=false;}else{if(Math.abs(dx)>0.4)c.dir=dx>0?1:-1;var sp=c.boss?0.5:0.6;c.x+=dx/d*sp;c.y+=dy/d*sp;setPose(c,'stand');}}else{c.timer--;if(c.timer<=0)chooseGoal(c);}var s=(0.82+(c.y-286)/165*0.5)*c.mul;c.sortY=c.y;c.g.setAttribute('transform','translate('+c.x.toFixed(1)+','+c.y.toFixed(1)+') scale('+s.toFixed(2)+')');var ps=c.g.querySelector('.ps');if(c.state==='walk'){c.ph+=0.25;var bob=Math.abs(Math.sin(c.ph))*-2.5;ps.setAttribute('transform','translate(0,'+bob.toFixed(1)+') scale('+c.dir+',1)');var lg=ps.querySelector('.lg');if(lg)lg.setAttribute('transform','translate('+(Math.sin(c.ph)*2.5).toFixed(1)+',0)');}else if(c.state==='work'){c.ph+=0.3;var h=ps.querySelector('.hd');if(h)h.setAttribute('transform','translate(0,'+(Math.abs(Math.sin(c.ph*2))*1.4).toFixed(1)+')');ps.setAttribute('transform','translate(0,0)');}else if(c.state==='drink'){c.ph+=0.08;var cp=ps.querySelector('.cp');if(cp){var l=(Math.sin(c.ph)*0.5+0.5)*-3;cp.setAttribute('transform','translate('+(-4*(Math.sin(c.ph)*0.5+0.5)).toFixed(1)+','+l.toFixed(1)+')');}ps.setAttribute('transform','scale('+c.dir+',1)');}else ps.setAttribute('transform','scale('+c.dir+',1)');ps.style.filter=(selected===c)?'drop-shadow(0 0 3px #f4d47c)':'none';});[].concat(desks,[bossDesk],props,chars).sort(function(a,b){return a.sortY-b.sortY;}).forEach(function(o){world.appendChild(o.g);});requestAnimationFrame(frame);}
  requestAnimationFrame(frame);

  function chip(label,val,color){return '<div style="background:#324066;border-radius:8px;padding:8px 6px;text-align:center"><div style="color:'+color+';font-size:20px;font-weight:500">'+val+'</div><div style="color:#9fb3d8;font-size:11px">'+label+'</div></div>';}
  function renderStats(){var s=stats();statsEl.innerHTML=chip('active jobs',s.active,'#f4d47c')+chip('gate &le;48h',s.gateToday,'#f0997b')+chip('GP &lt;3%',s.gp0,'#f09595')+chip('to release',s.pending,'#9fe1cb');chars.forEach(function(c){var key=c.s.badge;var n=key?s[key]:0;c._busy=n;var b=c.g.querySelector('.bd');b.innerHTML=n>0?'<circle cx="14" cy="0" r="7" fill="#e24b4a"/><text x="14" y="3" text-anchor="middle" font-size="8" fill="#fff">'+n+'</text>':'';});}
  renderStats();

  var timers=[];
  timers.push(setInterval(renderStats,4000));
  var tm=540;timers.push(setInterval(function(){tm=(tm+1)%1440;var el=document.getElementById('sfpof_clk');if(el)el.textContent=(''+Math.floor(tm/60)).padStart(2,'0')+':'+(''+tm%60).padStart(2,'0');},900));
  window.SFPOffice={refresh:renderStats,_timers:timers};
 }

 /* ================= access gate ================= */
 function gate(){
   if(currentEmail()===ALLOWED){ if(!document.getElementById('page-office')) buildOffice(); }
   else { removeOffice(); }
 }
 gate();
 setInterval(gate,3000);
})();
</script>
